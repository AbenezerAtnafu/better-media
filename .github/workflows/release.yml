name: Release

on:
  push:
    tags:
      - "v*"

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write
  id-token: write # Required for NPM provenance and OIDC authentication

env:
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ vars.TURBO_TEAM || github.repository_owner }}
  TURBO_CACHE: remote:rw
  TURBO_FORCE: true

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Needed for changelog generation

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"
          registry-url: "https://registry.npmjs.org"

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Determine npm tag
        id: determine_npm_tag
        shell: bash
        run: |
          TAG="${GITHUB_REF#refs/tags/}"

          if [[ "$TAG" =~ -(next|canary|beta|rc)(\.[0-9]+)?$ ]]; then
            NPM_TAG="${BASH_REMATCH[1]}"
          else
            git fetch origin main
            if git branch -r --contains "$GITHUB_SHA" | grep -q "origin/main"; then
              NPM_TAG="latest"
            else
              echo "::error ::Releases with the 'latest' npm tag must point to a commit on main."
              exit 1
            fi
          fi

          echo "npm_tag=$NPM_TAG" >> "$GITHUB_OUTPUT"
          echo "Using npm tag: $NPM_TAG"

      - name: Publish to npm
        run: pnpm changeset publish --tag "${{ steps.determine_npm_tag.outputs.npm_tag }}"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: true # Enable verifiable build links on NPM

